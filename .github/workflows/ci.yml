name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing
        env:
          PYTHONDONTWRITEBYTECODE: 1

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  model-validation:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Data validation
        run: |
          python -c "
          try:
              from src.data.loader import load_gaming_behavior
              from src.data.validation import validate_raw_data
              df = load_gaming_behavior()
              validate_raw_data(df)
              print('Data validation passed')
          except FileNotFoundError:
              print('Data file not found - skipping validation')
          "

      - name: Model performance gate
        run: |
          python -c "
          import sys
          try:
              import joblib
              from pathlib import Path
              model_path = Path('models/best_model.joblib')
              if not model_path.exists():
                  print('Model not found - skipping performance gate')
                  sys.exit(0)
              model = joblib.load(model_path)
              print(f'Model type: {type(model).__name__}')
              print('Model performance gate passed')
          except Exception as e:
              print(f'Model validation failed: {e}')
              sys.exit(1)
          "

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: gameai-analytics:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
