services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GAMEAI_API_KEYS=dev-key-gameai-2024
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      api:
        condition: service_healthy

  mlflow:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/app/mlflow
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db
