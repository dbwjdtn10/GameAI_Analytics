groups:
  - name: gameai-api
    rules:
      - alert: HighErrorRate
        expr: rate(gameai_prediction_errors_total[5m]) / rate(gameai_prediction_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High prediction error rate"
          description: "Error rate is above 5% for the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(gameai_prediction_latency_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High prediction latency"
          description: "p95 latency is above 1 second for the last 5 minutes."

      - alert: ModelNotLoaded
        expr: gameai_model_loaded == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ML model is not loaded"
          description: "The prediction model has been unloaded for more than 1 minute."

      - alert: HighDataDrift
        expr: gameai_drift_ratio > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High data drift detected"
          description: "Data drift ratio is above 50%. Consider retraining the model."

      - alert: CacheUnavailable
        expr: rate(gameai_cache_hits_total[5m]) == 0 and rate(gameai_cache_misses_total[5m]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis cache appears unavailable"
          description: "No cache hits or misses recorded in 5 minutes. Redis may be down."

      - alert: HighRiskUserSpike
        expr: increase(gameai_high_risk_users_total[1h]) > 100
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Spike in high-risk user detections"
          description: "More than 100 high/critical risk users detected in the last hour."
