stages:
  validate:
    cmd: python -c "
      from src.data.loader import load_gaming_behavior;
      from src.data.validation import validate_raw_data;
      df = load_gaming_behavior();
      df = validate_raw_data(df);
      print(f'Validation passed: {len(df)} rows OK')
      "
    deps:
      - src/data/loader.py
      - src/data/validation.py
      - data/raw/gaming_behavior/online_gaming_behavior_dataset.csv

  prepare:
    cmd: python -c "
      from src.data.loader import load_gaming_behavior;
      from src.features.engineer import engineer_gaming_behavior_features;
      from src.data.validation import validate_engineered_data;
      df = load_gaming_behavior();
      df = engineer_gaming_behavior_features(df);
      df = validate_engineered_data(df);
      df.to_csv('data/processed/gaming_features.csv', index=False);
      print(f'Prepared & validated {len(df)} rows')
      "
    deps:
      - src/data/loader.py
      - src/features/engineer.py
      - src/data/validation.py
      - data/raw/gaming_behavior/online_gaming_behavior_dataset.csv
    outs:
      - data/processed/gaming_features.csv

  train:
    cmd: python scripts/train.py --tune --tune-trials 30
    deps:
      - scripts/train.py
      - src/models/trainer.py
      - src/models/evaluator.py
      - data/processed/gaming_features.csv
    outs:
      - models/best_model.joblib
    plots:
      - models/roc_comparison.png
      - models/confusion_matrix.png
      - models/feature_importance.png

  evaluate:
    cmd: python scripts/evaluate.py
    deps:
      - scripts/evaluate.py
      - models/best_model.joblib
    plots:
      - models/shap_summary.png
      - models/shap_bar.png
      - models/shap_waterfall_high_risk.png
